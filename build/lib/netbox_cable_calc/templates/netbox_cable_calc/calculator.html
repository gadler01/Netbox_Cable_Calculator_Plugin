{% extends 'base/layout.html' %}
{% load static %}
{% block title %}Cable Length Calculator{% endblock %}
{% block content %}
<div class="row">
  <div class="col-12">
    <div class="card">
      <h5 class="card-header">Cable Length Calculator - BOM</h5>
      <div class="card-body p-3">
        <form method="get" action="{% url 'plugins:netbox_cable_calc:bom-api' %}" class="mb-3">
          <div class="row">
            <div class="col-md-6">
              <label for="site_id">Site:</label>
              <select name="site_id" id="site_id" class="form-control" style="width: 100%;">
                <option value="">-- Select Site --</option>
                {% for site in sites %}
                  <option value="{{ site.id }}">{{ site.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label for="location_id">Location:</label>
              <select name="location_id" id="location_id" class="form-control" style="width: 100%;">
                <option value="">-- Select Location --</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary mt-3">Generate BOM</button>
        </form>
        <div id="bom-results"></div>
      </div>
    </div>
  </div>
</div>
<script>
window.NETBOX_SITE_TREE = {{ site_tree_json|safe }};
</script>
<script src="{% static 'netbox_cable_calc/calculator.js' %}"></script>
{% endblock %}
